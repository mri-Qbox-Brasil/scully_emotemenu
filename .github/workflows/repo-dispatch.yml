name: Notify Docs Update

# Publica o MANUAL.md deste repo na documentação (docs-mriqbox).
#
# Este arquivo é IDÊNTICO em todos os repositórios — não edite nada aqui.
# O que varia por repo são variáveis (Settings → Secrets and variables → Actions):
#
#   DOC_NAME  nome exibido na sidebar   (vazio => nome do repositório)
#   DOC_SLUG  slug da página publicada  (vazio => nome do repositório;
#             usado apenas em repos de fonte privada "<repo>-source")

on:
  push:
    branches: [main, master]
    paths:
      - MANUAL.md
  workflow_dispatch:

jobs:
  notify-docs:
    uses: mri-Qbox-Brasil/workflows/.github/workflows/callable-repo-dispatch.yml@main
    secrets:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
    with:
      friendly-name: ${{ vars.DOC_NAME }}
      doc-file: MANUAL.md
      publish-as: ${{ vars.DOC_SLUG }}
